<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Láminas — Chapucero Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #0d0e11;
            --s1:       #141519;
            --s2:       #1c1d23;
            --border:   rgba(255,255,255,0.07);
            --accent:   #f59e0b;
            --accent2:  #ef4444;
            --green:    #10b981;
            --text:     #f0f0f5;
            --muted:    #6b7280;
            --mono:     'IBM Plex Mono', monospace;
            --sans:     'Outfit', sans-serif;
            --display:  'Syne', sans-serif;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(245,158,11,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245,158,11,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        header {
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(13,14,17,0.95);
            backdrop-filter: blur(16px);
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--display);
            font-size: 20px;
            font-weight: 800;
            color: #000;
        }

        .brand-name {
            font-family: var(--display);
            font-size: 18px;
            font-weight: 700;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-secondary {
            background: var(--s2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
        }

        .btn-primary:hover {
            background: #fbbf24;
        }

        .btn-success {
            background: var(--green);
            color: #000;
            flex: 1;
        }

        .btn-danger {
            background: var(--accent2);
            color: white;
            flex: 1;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .main {
            padding: 32px;
            max-width: 1800px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-title {
            font-family: var(--display);
            font-size: 32px;
            font-weight: 700;
        }

        .stats {
            font-family: var(--mono);
            font-size: 14px;
            color: var(--muted);
        }

        .stats strong {
            color: var(--accent);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .lamina-card {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }

        .lamina-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(245,158,11,0.2);
        }

        .lamina-image {
            width: 100%;
            aspect-ratio: 9/16;
            background: var(--s2);
            overflow: hidden;
        }

        .lamina-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .lamina-info {
            padding: 16px;
        }

        .lamina-title {
            font-family: var(--display);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .lamina-meta {
            font-size: 12px;
            font-family: var(--mono);
            color: var(--muted);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 32px;
            overflow-y: auto;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--s1);
            border: 1px solid var(--border);
            border-radius: 14px;
            max-width: 1100px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: var(--display);
            font-size: 24px;
            font-weight: 700;
            max-width: 80%;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--s2);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .modal-close:hover {
            border-color: var(--accent);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 500px 1fr;
            gap: 32px;
        }

        .modal-image {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .modal-image img {
            width: 100%;
            display: block;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .content-section {
            background: var(--s2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .content-label {
            font-size: 11px;
            font-family: var(--mono);
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        .content-text {
            color: var(--text);
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 64px 32px;
            color: var(--muted);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-title {
            font-family: var(--display);
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--s1);
            border: 1px solid var(--border);
            padding: 14px 20px;
            border-radius: 10px;
            font-family: var(--mono);
            font-size: 13px;
            display: none;
            z-index: 2000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .toast.ok { border-left: 4px solid var(--green); }
        .toast.err { border-left: 4px solid var(--accent2); }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 968px) {
            .modal-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="brand">
            <div class="brand-mark">CH</div>
            <div class="brand-name">Galería de Láminas</div>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="cargarLaminas()">
                🔄 Actualizar
            </button>
            <button class="btn btn-primary" onclick="window.location.href='index.html'">
                ➕ Nueva Lámina
            </button>
        </div>
    </header>

    <div class="main">
        <div class="page-header">
            <h1 class="page-title">Galería de Láminas</h1>
            <div class="stats">
                Total: <strong id="totalLaminas">0</strong> láminas
            </div>
        </div>

        <div id="gallery" class="gallery"></div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No hay láminas guardadas</div>
            <p>Crea tu primera lámina para verla aquí</p>
        </div>
    </div>

    <div id="modalLamina" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitulo"></h2>
                <button class="modal-close" onclick="cerrarModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="modal-grid">
                    <div class="modal-image">
                        <img id="modalImagen" src="" alt="Lámina">
                    </div>
                    <div class="modal-content">
                        <div class="content-section">
                            <div class="content-label">Post X</div>
                            <div class="content-text" id="modalPostX"></div>
                        </div>
                        <div class="content-section">
                            <div class="content-label">Hashtags</div>
                            <div class="content-text" id="modalHashtags"></div>
                        </div>
                        <div class="modal-actions">
                            <button class="btn btn-success" onclick="publicarLamina()">
                                <span>📲</span>
                                <span>Publicar</span>
                            </button>
                            <button class="btn btn-danger" onclick="borrarLamina()">
                                <span>🗑️</span>
                                <span>Borrar</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

<script>
    const API_URL = '/api';
    const N8N_URL = 'https://n8n-ukzb.onrender.com';

    let laminaSeleccionada = null;
    let laminas = [];
    let usuarioActual = localStorage.getItem('usuarioActual') || 'Sin usuario';

    // ══════════════════════════════════════════════════
    // INICIALIZACIÓN
    // ══════════════════════════════════════════════════
    window.onload = function() {
        cargarLaminas();
    };

    // ══════════════════════════════════════════════════
    // CARGAR LÁMINAS
    // ══════════════════════════════════════════════════
    async function cargarLaminas() {
        try {
            const response = await fetch(`${API_URL}/laminas?usuario=${usuarioActual}&incluir_publicadas=false`);
            
            if (!response.ok) throw new Error('Error al cargar láminas');

            const data = await response.json();
            laminas = data.laminas || [];

            const gallery = document.getElementById('gallery');
            const emptyState = document.getElementById('emptyState');

            if (laminas.length === 0) {
                gallery.style.display = 'none';
                emptyState.style.display = 'block';
                document.getElementById('totalLaminas').textContent = '0';
                return;
            }

            gallery.style.display = 'grid';
            emptyState.style.display = 'none';
            gallery.innerHTML = '';

            laminas.reverse().forEach(lamina => {
                const card = crearTarjetaLamina(lamina);
                gallery.appendChild(card);
            });

            document.getElementById('totalLaminas').textContent = laminas.length;
        } catch (error) {
            toast(`❌ Error al cargar: ${error.message}`, 'err');
        }
    }

    // ══════════════════════════════════════════════════
    // CREAR TARJETA
    // ══════════════════════════════════════════════════
    function crearTarjetaLamina(lamina) {
        const card = document.createElement('div');
        card.className = 'lamina-card';
        card.onclick = () => abrirModal(lamina);

        const fecha = new Date(lamina.fecha_creacion);
        const fechaTexto = fecha.toLocaleDateString('es-MX', {
            day: '2-digit',
            month: 'short',
            year: 'numeric'
        });

        card.innerHTML = `
            <div class="lamina-image">
                ${lamina.url_lamina ? 
                    `<img src="${lamina.url_lamina}" alt="${lamina.titulo}">` :
                    '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);">Sin imagen</div>'
                }
            </div>
            <div class="lamina-info">
                <div class="lamina-title">${lamina.titulo}</div>
                <div class="lamina-meta">
                    ${lamina.usuario} • ${fechaTexto}
                </div>
            </div>
        `;

        return card;
    }

    // ══════════════════════════════════════════════════
    // MODAL
    // ══════════════════════════════════════════════════
    function abrirModal(lamina) {
        laminaSeleccionada = lamina;

        document.getElementById('modalTitulo').textContent = lamina.titulo;
        document.getElementById('modalImagen').src = lamina.url_lamina || '';
        document.getElementById('modalPostX').textContent = lamina.post_x || 'Sin contenido';
        document.getElementById('modalHashtags').textContent = lamina.hashtags || 'Sin hashtags';

        document.getElementById('modalLamina').classList.add('show');
    }

    function cerrarModal() {
        document.getElementById('modalLamina').classList.remove('show');
        laminaSeleccionada = null;
    }

    // ══════════════════════════════════════════════════
    // PUBLICAR
    // ══════════════════════════════════════════════════
    async function publicarLamina() {
        if (!laminaSeleccionada) return;

        const btn = event.target.closest('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> <span>Publicando...</span>';

        try {
            const response = await fetch(`${API_URL}/publicar/${laminaSeleccionada.id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (!response.ok) throw new Error('Error al publicar');

            toast('✅ Lámina publicada correctamente', 'ok');
            cerrarModal();
            
            setTimeout(() => {
                cargarLaminas();
            }, 1000);

        } catch (error) {
            toast(`❌ Error: ${error.message}`, 'err');
            btn.disabled = false;
            btn.innerHTML = '<span>📲</span> <span>Publicar</span>';
        }
    }

    // ══════════════════════════════════════════════════
    // BORRAR
    // ══════════════════════════════════════════════════
    async function borrarLamina() {
        if (!laminaSeleccionada) return;

        if (!confirm('¿Estás seguro de que deseas borrar esta lámina?')) return;

        try {
            const response = await fetch(`${API_URL}/laminas/${laminaSeleccionada.id}`, {
                method: 'DELETE'
            });

            if (!response.ok) throw new Error('Error al eliminar');

            toast('✅ Lámina eliminada', 'ok');
            cerrarModal();
            cargarLaminas();
        } catch (error) {
            toast(`❌ Error: ${error.message}`, 'err');
        }
    }

    // ══════════════════════════════════════════════════
    // TOAST
    // ══════════════════════════════════════════════════
    function toast(msg, type = 'info') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast ${type}`;
        el.style.display = 'block';
        clearTimeout(window._toastT);
        window._toastT = setTimeout(() => el.style.display = 'none', 4000);
    }

    // Cerrar modal al hacer click fuera
    document.getElementById('modalLamina').addEventListener('click', function(e) {
        if (e.target === this) {
            cerrarModal();
        }
    });
</script>
</body>
</html>
